<div class="row">
    <div class="col-xl-12 col-lg-12 col-md-12">
        <div class="row dashboardDetailsBtn">
            <!-- Total Vehicle Monitors -->
            <div class="col-xl-4 col-lg-6 col-md-6 col-sm-12">
                <div class="card" role="region" aria-labelledby="total-vehicle-monitors">
                    <div class="card-body cardInnerDash">
                        <div class="card-area">
                            <h6 id="total-vehicle-monitors">Total Vehicle Monitors</h6>
                        </div>
                        <div>
                            <h3 class="card-title cardDashNum" aria-label="1,036,278 total vehicle monitors">1,036,278</h3>
                        </div>
                        <div class="cardBottomLine check-details">
                            <a routerLink="#" aria-label="Check details about total vehicle monitors">Check Details</a>
                            <a routerLink="#" class="arrow-angle" aria-hidden="true">
                                <span class="material-symbols-outlined" aria-hidden="true">arrow_forward</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Urgent Alerts -->
            <div class="col-xl-4 col-lg-6 col-md-6 col-sm-12">
                <div class="card bg-pink" role="region" aria-labelledby="urgent-alerts">
                    <div class="card-body cardInnerDash">
                        <div class="card-area">
                            <h6 id="urgent-alerts">New Updates</h6>
                        </div>
                        <div>
                            <h3 class="card-title cardDashNum" aria-label="10 urgent alerts">800</h3>
                        </div>
                        <div class="cardBottomLine check-details color-check">
                            <a routerLink="#" aria-label="Check details about urgent alerts">Check Details</a>
                            <a routerLink="#" class="arrow-angle" aria-hidden="true">
                                <span class="material-symbols-outlined" aria-hidden="true">arrow_forward</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Recent Alerts -->
            <div class="col-xl-4 col-lg-12 col-md-12 col-sm-12">
                <div class="card rounded recentlyAlert userUI" role="region" aria-labelledby="recent-alert">
                    <div class="card-header bg-header-area">
                        <h5 id="recent-alert">Recent Alert</h5>
                        <a routerLink="#" class="view" aria-label="View all recent alerts">View All</a>
                    </div>
                    <div class="card-body bg-alert-area">
                        <div class="card-area">
                            <div class="userAuthorityBox">
                                <p><span aria-label="Vehicle Identification Number">JH4KA8260MC000001</span></p>
                                <span class="date-time" aria-label="Alert generated at 10:40 AM on Friday, December 10, 2024">10.40 AM, Fri 10 Dec 2024</span>
                            </div>
                            <h5>Suspected Theft Report Detected</h5>
                            <p class="authorityPara">
                                Theft detected for VIN XYZ123456 in Florida. Immediate action required.
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- User Table -->
 <app-user-table [tableData]="tableData" [page]="page" [totalPages]="totalPages" (handelPaginagtion)="handlePageChange($event)" (handelSearch)="handelSearch($event)"></app-user-table>
 
 <app-loader [IsLoading]="isLoading"></app-loader>
