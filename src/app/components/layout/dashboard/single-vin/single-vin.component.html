

<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered extralarge-mod">
      <div class="modal-content">
        <div class="modal-header modalTblHead">
          <h1 class="modal-title fs-5" id="exampleModalLabel">Specific VINs</h1>
          <button type="button" class="btn btn-primary modalExport" (click) = "getPDFData()">Export PDF</button>
          <button type="button" class="btn btn-close modalClose" data-bs-dismiss="modal" aria-label="Close">
          </button>
        </div>
        <div class="modal-body">
            <div class="card cxt">
                <div class="card-body px-0 userdashbrdTable reportTable pt-0">
                    <div class="table-responsive">
                        <table mat-table [dataSource]="tableData" class="table mat-elevation-z8" matSort>
                          <!-- Checkbox Column -->
                          <ng-container matColumnDef="select">
                            <th mat-header-cell *matHeaderCellDef class="checkBoxModal">
                              <mat-checkbox
                                (change)="toggleSelectAll($event)"
                                [checked]="isAllSelected()"
                                [indeterminate]="isIndeterminate()"
                                aria-label="Select all rows"
                              ></mat-checkbox>
                            </th>
                            <td mat-cell *matCellDef="let element">
                              <mat-checkbox
                                [(ngModel)]="element.isSelected"
                                (change)="onRowSelectionChange(element)"
                                aria-label="Select row"
                              ></mat-checkbox>
                            </td>
                          </ng-container>
                      
                          <!-- VIN Column -->
                          <ng-container matColumnDef="vin">
                            <th mat-header-cell *matHeaderCellDef width="300">VINs</th>
                            <td mat-cell *matCellDef="let element" title="{{ element.vin }}">
                              <span
                                class="tableDot redDot"
                                [ngClass]="element.isOld ? 'tableDot grayDot' : 'tableDot redDot'"
                              ></span>{{ element.vin }}
                            </td>
                          </ng-container>
                      
                          <!-- Year Column -->
                          <ng-container matColumnDef="year">
                            <th mat-header-cell *matHeaderCellDef width="50">Year</th>
                            <td mat-cell *matCellDef="let element">
                              {{ element?.modelYear | dateFormat: 'YYYY' }}
                            </td>
                          </ng-container>
                      
                          <!-- Make Column -->
                          <ng-container matColumnDef="make">
                            <th mat-header-cell *matHeaderCellDef width="50">Make</th>
                            <td mat-cell *matCellDef="let element" title="{{ element?.model }}">
                              {{ element?.model ? element?.model : '-' }}
                            </td>
                          </ng-container>
                      
                          <!-- Alert Date Column -->
                          <ng-container matColumnDef="titleBrandDate">
                            <th mat-header-cell *matHeaderCellDef width="50">Alert Date</th>
                            <td mat-cell *matCellDef="let element">
                              {{ element?.titleBrandDate | dateFormat: 'DD MMM YYYY' }}
                            </td>
                          </ng-container>
                      
                          <!-- State Column -->
                          <ng-container matColumnDef="state">
                            <th mat-header-cell *matHeaderCellDef width="50">State</th>
                            <td mat-cell *matCellDef="let element" title="{{ element?.state }}">
                              <p class="boxTable">
                                {{ element?.state ? element?.state : '-' }}
                              </p>
                            </td>
                          </ng-container>
                      
                          <!-- Rows -->
                          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                        </table>
                      
                        <div *ngIf="tableData.length === 0" class="no-data-message text-center">
                          No data found
                        </div>
                      </div>
                  
                  
                </div>
              </div>
        </div>
        <!-- <div class="modal-footer">
            <button type="button" class="btn btn-primary" (click) = "getPDFData()">Export PDF</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" (click)="closeData()">Close</button>
          
        </div> -->
      </div>
    </div>
  </div>
  <app-loader [IsLoading]="isLoading"></app-loader>
