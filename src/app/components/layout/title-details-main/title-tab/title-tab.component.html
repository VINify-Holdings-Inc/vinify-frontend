<div class="row">
    <div class="col-lg-12 col-md-12 mb-4">
        <div class="cardWrapper">
            <div class="UserCardHeader cardMainHead">
                <h4 class="card-title">VIN Title Detail Records <span class="titleColor">(2000)</span></h4>
                <div class="cardSubHead">
                   
                    <div class="userSingleSearch">
                        <span class="VInNumberInput" >
                            <input type="text"  class="form-control" placeholder="Search VIN" />
                        </span>
                        <img alt="img"  src="assets/images/icons/search.svg" class="img-fluid" />
                    </div>
                    <div class="month-calendar userDashFilter calendar-svg dropdownFilter" type="button" id="alertMenu" data-bs-toggle="dropdown" aria-expanded="false">
                        <img alt="img" [src]="filerIcon" class="img-fluid"/>
                        <span>All Alerts</span>

                        <ul class="dropdown-menu menuFilter" aria-labelledby="alertMenu">
                            <li><a class="dropdown-item" routerLink="#">All Alerts</a></li>
                            <li><a class="dropdown-item" routerLink="#">Under</a></li>
                            <li><a class="dropdown-item" routerLink="#">Read</a></li>
                          </ul>
                    </div>
                    
                    
                    <div class="month-calendar vehicleMonthSearch calendar-svg">
                        <img alt="img" [src]="calendarIcon" class="img-fluid"/>
                        <p><span>Jan 6, 2024 – Jul 13, 2024</span></p>
                        
                    </div>
                    <div class="month-calendar vehicleMonthSearch calendar-svg">
                        <img alt="img"  [src]="pdfIcon" class="img-fluid"/>
                        <span>Export PDF </span>
                        <i class="material-symbols-outlined">keyboard_arrow_down</i>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-body px-0 userdashbrdTable pt-0">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-light-Usertbl">
                                <tr>
                                    <th>No</th>
                                    <th>Title</th>
                                    <th>VIN Number</th>
                                    <th>State</th>
                                    <th>Brand Code</th>
                                    <th>Make</th>
                                    <th>Make Year</th>
                                    <th>Title/Brand</th>
                 
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>1</td>
                                    <td><p>History</p></td>
                                    <td><p><span class="vinModelName">1FTCF15N5HLA06223</span></p></td>
                                    <td>AA</td>
                                    <td>-</td>
                                    <td>Chev</td>
                                    <td>2001</td>
                                    <td>2021-05-01</td>
                                </tr>
                            </tbody>

                        </table>
                    </div>
                    <div class="paginationArea">
                        <ul class="pagination pagination-lg">
                            <li class="page-item">
                                <button type="button" class="page-link"  >Previous</button>
                            </li>
                            <li class="page-item">
                                <span class="page-link">Page 1 of 1</span>
                            </li>
                            <li class="page-item">
                                <button type="button" class="page-link"  >Next</button>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Tooltip Component -->
        <!-- <app-tooltip id="my-tooltip"></app-tooltip> -->
        
    </div>
</div>
