

<div class="modal fade" id="exampleModalExport" tabindex="-1" aria-labelledby="exampleModalExport" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered extralarge-mod">
      <div class="modal-content">
        <div class="modal-header modalTblHead">
            <div class="userSingleSearch importbox pull-right" >
                <span class="VInNumberInput">
                    <img alt="img" src="assets/images/icons/search.svg" class="img-fluid"
                        (click)="getSearchVal()" />
                    <input id="SearchVINNumbers" type="text" [(ngModel)]="searchValue" (keydown.enter)="getSearchVal()"
                        (ngModelChange)="onType(searchValue)" class="form-control"
                        placeholder="Search VIN Number"  aria-label="SearchVINNumbers" />
                </span>
            </div>
            <div class="bulkupladsfea">
            <button type="button" class="btn btn-clear " (click) = "clearAll()">Clear</button>
          <button type="button" class="btn btn-primary modalExport" (click) = "getPDFData()">Initiate Process</button>
          <button  (click)="clearAll()" type="button" class="btn btn-close modalClose" data-bs-dismiss="modal" aria-label="Close" >
          </button>
          </div>
         
        </div>
        <div class="modal-body">
            <div class="card cxt">
                <div class="card-body px-0 userdashbrdTable reportTable pt-0">
                   
                    <div class="table-responsive">
                        <table mat-table [dataSource]="tableData" class="table mat-elevation-z8" matSort>
                             <ng-container matColumnDef="select">
                            <th mat-header-cell *matHeaderCellDef class="checkBoxModal" width="25">
                              <label   class="visually-hidden" for="SelectAllRo">Select all rows</label>
                              <mat-checkbox
                                (change)="toggleSelectAll($event)"
                                [checked]="isAllSelected()"
                                [indeterminate]="isIndeterminate()"
                                aria-label="SelectAllRo"
                              ></mat-checkbox>
                            </th>
                            <td mat-cell *matCellDef="let element" class="check-box">
                              <mat-checkbox
                                [(ngModel)]="element.isSelected"
                                (change)="onRowSelectionChange(element)"
                                aria-label="Select row"
                              ></mat-checkbox>
                            </td>
                          </ng-container>
                         <ng-container matColumnDef="vin">
                            <th mat-header-cell *matHeaderCellDef width="300">VINs</th>
                            <td mat-cell *matCellDef="let element" title="{{ element.vin }}">
                              <span
                                class="tableDot"
                                
                              ></span>{{ element.vin }}
                            </td>
                          </ng-container>
                          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                        </table>
                      
                        <div *ngIf="tableData.length === 0" class="no-data-message text-center">
                          No data found
                        </div>
                      </div>
                  
                  
                </div>
              </div>
        </div>
        
      </div>
    </div>
  </div>
  <app-loader [IsLoading]="isLoading"></app-loader>
