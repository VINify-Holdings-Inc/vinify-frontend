

<div class="SummaryCardDetails">
    <div class="card">
        <div class="card-header">
            <div class="cardHeaderStyle">
                <div class="topVehicleHead">
                    <div class="vehicleTitle">
                        <h4 class="card-title">
                            <!-- Static Tab Example, replace with dynamic logic -->
                            Vehicle Summary
                        </h4>
                        <p>VIN </p>
                    </div>

                    <div class="exportReport">
                        <button type="button" class="btn btn-primary">
                            <i class="material-symbols-outlined me-2">cloud_download</i>
                            Export Report
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card-body">
            <div class="tabVehicleSection cardHeaderJustify">
                <ul class="nav nav-tabs" id="myTab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link firstTab active" id="summary-tab" data-bs-toggle="tab" data-bs-target="#summaryTab" type="button" role="tab" aria-controls="summaryTab" aria-selected="true">
                            Summary
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="details-tab" data-bs-toggle="tab" data-bs-target="#detailsTab" type="button" role="tab" aria-controls="detailsTab" aria-selected="false">
                            Title Details
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link lastTab" id="additional-tab" data-bs-toggle="tab" data-bs-target="#additionalTab" type="button" role="tab" aria-controls="additionalTab" aria-selected="false">
                            Additional Information
                        </button>
                    </li>
                </ul>

                <div class="cardSubHead">
                    <div class="month-calendar">
                        <i class="material-symbols-outlined">calendar_today</i><span>Jan 6, 2024 - Jun 13, 2024</span>
                    </div>
                    <div class="month-calendar">
                        <span class="material-symbols-outlined">filter_list</span><span>Filters</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="tabBodySection">
        <div class="tab-content" id="myTabContent">
            <div class="tab-pane fade show active" id="summaryTab" role="tabpanel" aria-labelledby="summary-tab">
               <app-summary-inner></app-summary-inner>
            </div>

            <div class="tab-pane fade" id="detailsTab" role="tabpanel" aria-labelledby="details-tab">
                <div id="titleDetails">
                   <app-summary-title></app-summary-title>
                </div>
            </div>

            <div class="tab-pane fade" id="additionalTab" role="tabpanel" aria-labelledby="additional-tab">
                <div id="additionalInfo">
                    <app-summary-additional></app-summary-additional>
                </div>
            </div>
        </div>
    </div>
</div>
