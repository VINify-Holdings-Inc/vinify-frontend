<header>
    <div class="top-navbar headerSection">
        <nav class="navbar navbar-expand navbar-light bg-navbar header-Design">
            <div class="container-fluid px-0">
                <div class="logoHeader">
                        <img [src]="logo" class="img-fluid" alt="Logo" />
                </div>
                <button type="button" id="sidebarCollapse" (click)="toggleSidebar()" class="d-flex justify-center align-item-center d-xl-block">
                    <i class="material-symbols-outlined text-dark">menu</i>
                </button>
                <div class="collapse navbar-collapse d-lg-block d-xl-block d-md-none" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto d-flex align-items-center headerRight">
                        <li class="nav-item calendar-date">
                            <div class="d-flex align-items-center">
                                <img src="assets/images/icons/calendar-full.svg" class="img-fluid" alt="settings" />
                                <span class="d-flex update-time">
                                    Last Record Updated:
                                </span>
                                <span class="update-time">Jul 16, 2024 - 12:00 PM</span>
                            </div>
                        </li>
                        <li class="nav-item dropdown">
                            <a href="#" class="btn btn-custom navbar-btn_track" (click)="changeSearchIcon()" data-bs-toggle="dropdown" aria-expanded="false">
                                Track VIN Status
                                <img [src]="arrowIcon" *ngIf="searchIconToggle" class="img-fluid" alt="settings"/>
                                <img [src]="searchIcon" *ngIf="!searchIconToggle" class="img-fluid" alt="search"/>
                            </a>
                            <div class="dropdown-menu dropdown-menu-end VinTrackDiv">
                                <div class="custom-modal"></div>
                                <div class="trackVinNumber">
                                    <h4>VIN Track</h4>
                                    <div class="modalInput form-group position-relative">
                                            <input type="text"  [(ngModel)]="searchValue"  class="form-control" placeholder="Enter VIN number" />
                                        <button type="button" class="btn btn-custom" (click) = "getSearchVal()">Details</button>
                                    </div>
                                </div>
                            </div>
                        </li>
                        <li class="nav-item dropdown">
                            <img src="assets/images/icons/setting.svg" class="img-fluid" alt="settings" />
                        </li>
                        <li class="nav-item dropdown">
                            <a href="#" class="nav-link dropdown-toggle no-toggle-icon" data-bs-toggle="dropdown" aria-expanded="false">
                                <div class="notification-dot"><span>20</span></div>
                                <img src="assets/images/icons/bell.svg" class="img-fluid" alt="notifications" />

                            </a>
                            <ul class="dropdown-menu dropdown-menu-end notification-dropdown">
                                <li class="dropdown-item">
                                    <div class="d-flex justify-content-between p-2">
                                        <div class="card-title"><h4>Notifications</h4></div>
                                        <div><p class="notification-number">2 new</p></div>
                                    </div>
                                </li>
                                <li>
                                    <a href="#" class="dropdown-item">
                                        <div class="d-flex align-items-center">
                                            <span class="check-circle alertCheck">
                                                <i class="material-symbols-outlined">check</i>
                                            </span>
                                            <div class="notifications-points">
                                                <h5>Alert Resolved</h5>
                                                <p>Vehicle Reported Stolen</p>
                                            </div>
                                        </div>
                                    </a>
                                </li>
                                <!-- Add additional notification items here -->
                            </ul>
                        </li>
                        <li class="nav-item dropdown">
                            <a href="#" class="nav-link dropdown-toggle no-toggle-icon p-0" data-bs-toggle="dropdown" aria-expanded="false">
                                <img [src]="profile" class="rounded-circle headProfile" alt="Profile" />
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end profile_dropdown">
                                <li class="dropdown-item">
                                   <div class="ProfileHead">
                                        <div class="profileName">
                                            <h5>{{userName}}</h5>
                                            <span class="vin_label">Marlynonami.co</span>
                                        </div>
                                        <div><span class="ProfileComplete">90% Complete</span></div>
                                    </div>
                                </li>
                                <li>
                                    <a routerLink="/view-user-profile" class="dropdown-item profile-link">
                                        <img [src]="profileIcon" class="img-fluid" alt="icon" />
                                        <span>Profile</span>
                                    </a>
                                </li>
                           
                                <li>
                                    <a routerLink="#" type="button" class="dropdown-item logbtn profile-link" (click)="logout()" >
                                        <img  [src]="logIcon" class="img-fluid" alt="icon"/>
                                        <span >Log Out</span>
                                    </a>
                                </li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>
</header>
