name: Deploy to production

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Angular Project
        run: npx ng build --configuration=production

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Upload build to S3
        run: aws s3 sync dist/mvm/browser/ s3://vinify-frontend-deploy-artifacts/ --delete

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-065704b19bce21f09" \
            --document-name "AWS-RunShellScript" \
            --comment "vinify-frontend deploy from ${{ github.sha }}" \
            --parameters 'commands=[
              "set -e",
              "sudo aws s3 sync s3://vinify-frontend-deploy-artifacts/ /var/www/web --delete"
            ]' \
            --output text --query "Command.CommandId")

          echo "SSM Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "i-065704b19bce21f09" || true

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "i-065704b19bce21f09" \
            --output json > invocation.json

          cat invocation.json

          STATUS=$(python3 -c "import json;print(json.load(open('invocation.json'))['Status'])")
          if [ "$STATUS" != "Success" ]; then
            echo "Deploy failed with status: $STATUS"
            exit 1
          fi
